<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050C1A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#7B2CBF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)" />
  
  <g transform="translate(128, 128)" filter="url(#glow)">
    <!-- Main C-shape -->
    <path d="M128,0 A128,128 0 1,0 256,128 L196,128 A68,68 0 1,1 128,60 Z" fill="url(#brand)"/>
    
    <!-- Nodes -->
    <circle cx="216" cy="30" r="28" fill="#00F0FF" />
    <circle cx="216" cy="226" r="28" fill="#7B2CBF" />
    <circle cx="30" cy="128" r="32" fill="#00F0FF" />
    
    <!-- Connecting lines inner -->
    <line x1="128" y1="60" x2="216" y2="30" stroke="#00F0FF" stroke-width="8" />
    <line x1="128" y1="196" x2="216" y2="226" stroke="#7B2CBF" stroke-width="8" />
  </g>
</svg>
